<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verseny létrehozása ⚙️</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Verseny létrehozása</h1>

        <div class="card">
            <label for="sessionName"><strong>Verseny neve:</strong></label>
            <input type="text" id="sessionName" value="Verseny">

            <label for="tableCount"><strong>Asztalok száma:</strong></label>
            <input type="number" id="tableCount" min="1" value="4">

            <label for="boardCount"><strong>Leosztások száma:</strong></label>
            <input type="number" id="boardCount" min="1" max="24" value="4">
        </div>

        <button id="createBtn" class="btn" style="background-color: #2b7a0b;">Verseny létrehozása</button>
        <a href="index.html" class="btn">Vissza a főoldalra</a>

        <div style="font-size: smaller; text-align: center;">
            built with ♥️ by wavee.labs 🌊
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/utils.js"></script>


    <script>

        directorLogin();

        let createButton = document.getElementById("createBtn");
        createButton.addEventListener("click", onCreateClick);

        function onCreateClick() {
            let name = document.getElementById("sessionName").value;
            let tables = document.getElementById("tableCount").value;
            let boards = document.getElementById("boardCount").value;

            if (name.trim() === "") {
                name = "Névtelen verseny";
                //robinak valami alap név h ne kapjon agyfaszt
            }

            createTournament(name, tables, boards);
            alert("A verseny sikeresen létrehozva! 🎉");
            window.location.href = "director-dashboard.html";
        }
    </script>
</body>

</html>
