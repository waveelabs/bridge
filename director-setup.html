<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director setup ⚙️</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Director setup ⚙️</h1>

        <div class="card">
            <h2>Session details</h2>

            <label for="sessionName"><strong>Session Name:</strong></label>
            <input type="text" id="sessionName" value="My Session">

            <label for="tableCount"><strong>Number of Tables:</strong></label>
            <input type="number" id="tableCount" min="1" value="4">

            <label for="boardCount"><strong>Number of Boards:</strong></label>
            <input type="number" id="boardCount" min="1" max="24" value="4">
        </div>

        <button id="createBtn" class="btn" style="background-color: #2b7a0b;">Create Session</button>
        <a href="index.html" class="btn">Go Back Home</a>

        <div style="font-size: smaller; text-align: center;">
            built with ♥️ by wavee.labs 🌊
        </div>
    </div>

    <script src="js/mock-data.js"></script>

    <script>
        let createButton = document.getElementById("createBtn");
        createButton.addEventListener("click", onCreateClick);

        function onCreateClick() {
            let name = document.getElementById("sessionName").value;
            let tables = document.getElementById("tableCount").value;
            let boards = document.getElementById("boardCount").value;

            if (name.trim() === "") {
                name = "Untitled Session";
                //robinak valami alap név h ne kapjon agyfaszt
            }

            createTournament(name, tables, boards);
            alert("Session created successfully! 🎉");
            window.location.href = "director-dashboard.html";
        }
    </script>
</body>

</html>
