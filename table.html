<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szkórlap 📝</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <h1>Szkórlap 📝</h1>

        <div class="card">
            <div class="form-row">
                <div class="form-col">
                    <label for="tableNum"><strong>Asztal: </strong></label>
                    <input type="number" id="tableNum" min="1" value="1">
                </div>
                <div class="form-col">
                    <label for="boardNum"><strong>Leosztás: </strong></label>
                    <input type="number" id="boardNum" min="1" value="1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">
                    <label for="nsPair"><strong>N-S pár: </strong></label>
                    <input type="number" id="nsPair" min="1">
                </div>
                <div class="form-col">
                    <label for="ewPair"><strong>E-W pár: </strong></label>
                    <input type="number" id="ewPair" min="1">
                </div>

            </div>

            <div class="form-row">
                <div class="form-col">
                    <label for="contractLevel"><strong>Szint (1-7):</strong></label>
                    <select id="contractLevel">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                    </select>
                </div>

                <div class="form-col">
                    <label for="contractSuit"><strong>Szín:</strong></label>
                    <select id="contractSuit">
                        <option value="C">♣️ Treff</option>
                        <option value="D">♦️ Káró</option>
                        <option value="H">♥️ Kör</option>
                        <option value="S">♠️ Pikk</option>
                        <option value="NT">Szanzadu (NT)</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-col">

                    <label for="contractDoubled"><strong>Kontra:</strong></label>
                    <select id="contractDoubled">
                        <option value="none">Nincs</option>
                        <option value="X">Kontra</option>
                        <option value="XX">Rekontra</option>
                    </select>
                </div>

                <div class="form-col">
                    <label for="declarer"><strong>Felvevő:</strong></label>
                    <select id="declarer">
                        <option value="N">North</option>
                        <option value="E">East</option>
                        <option value="S">South</option>
                        <option value="W">West</option>
                    </select>
                </div>

            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="isVulnerable"><strong>Felvevő szkórhelyzete:</strong></label>
                    <select id="isVulnerable">
                        <option value="no">Mans</option>
                        <option value="yes">Bell</option>
                    </select>
                </div>
                <div class="form-col">
                    <label for="tricksTaken"><strong>Elnyert ütések (0-13):</strong></label>
                    <input type="number" id="tricksTaken" min="0" max="13">
                </div>
            </div>
        </div>

        <div id="formMessage" class="warning-box" style="display: none; margin-bottom: 20px;"></div>

        <button id="submitBtn" class="btn" style="background-color: #2b7a0b;">Eredmény beküldése</button>
        <a href="index.html" class="btn">Vissza a főoldalra</a>
    </div>


    <div style="font-size: smaller; text-align: center;">
        built with ♥️ by wavee.labs 🌊
    </div>

    </div>

    <script src="js/mock-data.js"></script>

    <script>

        // submit button magic
        let submitBtn = document.getElementById("submitBtn");
        submitBtn.addEventListener("click", onSubmitClick);

        function showMessage(text, isError) {
            let msgBox = document.getElementById("formMessage");
            msgBox.innerText = text;
            msgBox.style.display = "block"; // jelenjen meg

            if (isError) {
                //red
                msgBox.style.borderColor = "#cc0000";
                msgBox.style.backgroundColor = "#fff0f0";
                msgBox.style.color = "#cc0000";
            }
            else {
                //green
                msgBox.style.borderColor = "#2b7a0b";
                msgBox.style.backgroundColor = "#f0fdf0";
                msgBox.style.color = "#2b7a0b";
            }
        }

        function onSubmitClick() {

            // database
            let db = getDatabase();
            if (db === null) {
                showMessage("Még nincs létrehozott verseny!", true);
                return;
            }

            // let'g gather the daaaaata
            let resultData = {
                table: document.getElementById("tableNum").value,
                board: document.getElementById("boardNum").value,
                pairNS: document.getElementById("nsPair").value,
                pairEW: document.getElementById("ewPair").value,
                level: document.getElementById("contractLevel").value,
                suit: document.getElementById("contractSuit").value,
                doubled: document.getElementById("contractDoubled").value,
                declarer: document.getElementById("declarer").value,
                isVulnerable: document.getElementById("isVulnerable").value,
                tricks: document.getElementById("tricksTaken").value
            }

            //validáció
            if (resultData.pairNS === "" || resultData.pairEW === "" || resultData.tricks === "") {
                showMessage("Kérlek töltsd ki a N-S pár, E-W pár és az Elnyert ütések mezőket!", true);
                return;
            }

            // meg kéne nézni, hogy ez a table és board combo létezik-e

            let foundMistake = false;
            for (let i = 0; i < db.results.length; i++) {
                let pastGame = db.results[i];

                if (pastGame.table === resultData.table && pastGame.board === resultData.board) {
                    //felülírja, ha leokézzák (sok figyelmeztetéssel)
                    let answer = window.confirm("⚠️ Ezzel felülírod a már beküldött adatot! Biztosan folytatod? ⚠️");
                    if (answer) {
                        db.results[i] = resultData;
                        foundMistake = true;
                        break;
                    }
                    else {
                        // egyébként csak kilépünk
                        return;
                    }
                }
            }

            if (foundMistake === true) {
                //felül akarja írni
                saveDatabase(db);
                showMessage("Hiba javítva! ✅ " + resultData.board + ". leosztás, " + resultData.table + ". asztal sikeresen frissítve! 🎉", false);
            }
            else {
                //sima mentés
                db.results.push(resultData);
                saveDatabase(db);
                showMessage(resultData.board + ". leosztás, " + resultData.table + ". asztal eredménye sikeresen beküldve! 🎉", false);

                // kövi board a kényelemért
                document.getElementById("boardNum").value = parseInt(resultData.board) + 1;
            }

            //letisztítjuk a formot
            document.getElementById("tricksTaken").value = "";

            //legörgetünk
            window.scrollTo(0, document.body.scrollHeight);
        }


        // recent score logika itt lehetne

    </script>

</body>

</html>
